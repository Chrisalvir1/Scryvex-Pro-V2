# Home Assistant Addon Configuration
# ╔══════════════════════════════════════════════════════════════════╗
# ║  AISLADORES DE INSTANCIA — NO MODIFICAR ESTOS 4 VALORES        ║
# ║  Garantizan que esta instancia SIEMPRE use su propia BD         ║
# ║  aunque haya otro Scrypted oficial corriendo en el mismo HA     ║
# ╠══════════════════════════════════════════════════════════════════╣
# ║  slug: scryvex_pro_gc           → ID único en HA Supervisor    ║
# ║  SCRYPTED_VOLUME: scrypted_gc_data  → BD/credenciales exclusiva ║
# ║  SCRYPTED_NVR_VOLUME: scrypted_gc_nvr → Grabaciones exclusivas  ║
# ║  image: ghcr.io/chrisalvir1/scrypted  → Registry propio        ║
# ║         (NO ghcr.io/koush/scrypted)  → versión controlada      ║
# ╚══════════════════════════════════════════════════════════════════╝
name: Scryvex Pro
version: "0.156.0"
slug: scryvex_pro_gc
description: Scryvex Pro is a high performance home video integration and automation platform
url: "https://github.com/chrisalvir/scrypted-pro"
arch:
  - amd64
  - aarch64
init: false
ingress: true
ingress_port: 11080
panel_icon: mdi:cctv
panel_title: "Scryvex Pro"
hassio_api: true
homeassistant_api: true
ingress_stream: true
host_network: true
gpio: true
usb: true
uart: true
video: true
# ─── REGISTRY PROPIO ─ nunca cambiar a ghcr.io/koush/scrypted ────────
image: "ghcr.io/chrisalvir1/scrypted"
environment:
  SCRYPTED_INSTALL_PLUGIN: "@scrypted/homeassistant"
  # ─── AISLADOR #1: Volumen de datos exclusivo ──────────────────────
  SCRYPTED_VOLUME: "/data/scrypted_gc_data"
  # ─── AISLADOR #2: Volumen NVR exclusivo ───────────────────────────
  SCRYPTED_NVR_VOLUME: "/data/scrypted_gc_nvr"
  SCRYPTED_ADMIN_ADDRESS: "172.30.32.2"
  SCRYPTED_ADMIN_USERNAME: "homeassistant"
  SCRYPTED_INSTALL_ENVIRONMENT: "ha"
  SCRYPTED_CUSTOM_PLUGINS_DIR: "/scrypted-src/plugins"
  SCRYPTED_HTTPS_PORT: "11443"
  SCRYPTED_HTTP_PORT: "11080"
options: {}
schema: {}
backup_exclude:
  - '*/server/**'
  - '*/scrypted_nvr/**'
  - '*/scrypted_data/plugins/**'
map:
  - config:rw
  - media:rw
  - share:rw
devices:
  - /dev/mem
  - /dev/dri/renderD128
  - /dev/apex_0
  - /dev/apex_1
  - /dev/apex_2
  - /dev/apex_3
  - /dev/dri/card0
  - /dev/vchiq
  - /dev/video10
  - /dev/video0
