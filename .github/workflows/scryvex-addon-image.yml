name: Publish Scryvex Pro add-on image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version (for example, 3.9.0)'
        required: true
        type: string

env:
  IMAGE_NAME: ghcr.io/chrisalvir1/scryvex-pro-v2

jobs:
  publish:
    name: Publish official Scrypted Runtime for HA
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine image version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v6
        with:
          context: addon
          file: addon/Dockerfile.official
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            SCRYPTED_INSTALL_VERSION=latest
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.title=Scryvex Pro
