name: Build SDK

on:
  push:
    branches: ["main"]
    paths: ["sdk/**"]
  pull_request:
    paths: ["sdk/**"]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ./sdk

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.4.1
      - run: rm -f package-lock.json && npm install --legacy-peer-deps
      - run: npm run build > build_error.log 2>&1 || (git config --global user.email "bot@scrypted.app" && git config --global user.name "Scrypted Bot" && git add build_error.log && git commit -m "chore: save build error log" && git push origin main && exit 1)
