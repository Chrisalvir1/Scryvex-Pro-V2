name: Fetch Logs
on:
  push:
    branches:
      - experiment/typescript-7-0-1-rc

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Fetch logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" /repos/${{ github.repository }}/actions/runs/28637983601/logs > logs.zip
          unzip logs.zip -d logs
      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: actions-logs
          path: logs/
