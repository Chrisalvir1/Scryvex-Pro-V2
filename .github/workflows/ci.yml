name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/chrisalvir1/scryvex-pro-v2

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.10.0

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            pnpm \
              --filter "@scryvex/contracts..." \
              --filter "@scryvex/server..." \
              --filter "frontend..." \
              install --frozen-lockfile && break || sleep 15
          done

      - name: Build Contracts
        run: pnpm --filter @scryvex/contracts run build

      - name: Typecheck Server
        run: pnpm --filter @scryvex/server run typecheck

      - name: Test Server
        run: pnpm --filter @scryvex/server run test

      - name: Build Server
        run: pnpm --filter @scryvex/server run build

      - name: Typecheck Frontend
        run: pnpm --filter frontend run typecheck

      - name: Lint Frontend
        run: pnpm --filter frontend run lint

      - name: Build Frontend
        run: pnpm --filter frontend run build

  # This captures the known installation issue in plugins/hikvision-doorbell
  # without blocking the core packages or the add-on image, neither of which
  # currently builds or publishes that plugin.
  monorepo-integrity:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.10.0

      - name: Attempt complete monorepo installation
        run: pnpm install --frozen-lockfile

  publish-image:
    runs-on: ubuntu-latest
    needs: build-and-test

    # Los pull requests validan, pero no publican imágenes.
    if: github.event_name == 'push'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Read add-on version
        id: addon
        shell: bash
        run: |
          VERSION="$(sed -n 's/^version:[[:space:]]*"\(.*\)"/\1/p' addon/config.yaml)"
          test -n "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: addon
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          build-args: |
            BUILD_VERSION=${{ steps.addon.outputs.version }}
            SOURCE_REF=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.addon.outputs.version }}
            ${{ env.IMAGE_NAME }}-aarch64:${{ steps.addon.outputs.version }}
            ${{ env.IMAGE_NAME }}-amd64:${{ steps.addon.outputs.version }}
            ${{ env.IMAGE_NAME }}:alpha
            ${{ env.IMAGE_NAME }}-aarch64:alpha
            ${{ env.IMAGE_NAME }}-amd64:alpha
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
