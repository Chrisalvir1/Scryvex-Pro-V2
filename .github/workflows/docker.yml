name: Publish Scrypted Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "The npm tag used to build the Docker image. The tag will be resolved as a specific version on npm, and that will be used to version the docker image."
        required: true
        default: "latest"
      publish_tag:
        description: "The versioned tag for the published Docker image. NPM will use the minor version, Docker should only specify a patch version."
        required: false
  release:
    types: [published]

jobs:
  build:
    name: Push Docker image to Github Container Registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        BASE: [
          ["noble-full", ".s6", "noble-full", "full"]
        ]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Diagnostic host build
        env:
          NPM_CONFIG_LEGACY_PEER_DEPS: true
        run: |
          (
            echo "=== NODE VERSION ==="
            node -v
            echo "=== NPM VERSION ==="
            npm -v
            echo "=== BUILDING SDK ==="
            cd sdk && npm install && npm run build
            echo "=== BUILDING COMMON ==="
            cd ../common && npm install && npm run build
            echo "=== BUILDING WERIFT ==="
            cd ../external/werift && npm install && npm run build
            echo "=== BUILDING HOMEKIT ==="
            cd ../../plugins/homekit && npm install && npm run build
          ) 2>&1 | tee build.log

      - name: Upload logs to termbin on failure
        if: failure()
        run: |
          if [ -f build.log ]; then
            LINK=$(cat build.log | nc termbin.com 9999 || echo "failed")
            echo "=== DIAGNOSTIC LOGS UPLOADED TO: $LINK ==="
          else
            echo "build.log not found"
          fi

      - name: Set local Scrypted version
        id: package-version
        run: |
          VERSION=$(node -p "require('./server/package.json').version")
          echo "NPM_VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          build-args: |
            BASE=${{ matrix.BASE[0] }}
            SCRYPTED_INSTALL_VERSION=latest
          context: .
          file: install/docker/Dockerfile${{ matrix.BASE[1] }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/chrisalvir1/scrypted:v${{ steps.package-version.outputs.NPM_VERSION }}-${{ matrix.BASE[2] }}
            ghcr.io/chrisalvir1/scrypted:latest
            ghcr.io/chrisalvir1/scrypted:${{ matrix.BASE[2] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
