name: Publish Scrypted Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "The npm tag used to build the Docker image. The tag will be resolved as a specific version on npm, and that will be used to version the docker image."
        required: true
        default: "latest"
      publish_tag:
        description: "The versioned tag for the published Docker image. NPM will use the minor version, Docker should only specify a patch version."
        required: false
  release:
    types: [published]

jobs:
  build:
    name: Push Docker image to Github Container Registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        BASE: [
          ["noble-full", ".s6", "noble-full", "full"]
        ]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set local Scrypted version
        id: package-version
        run: |
          VERSION=$(node -p "require('./server/package.json').version")
          echo "NPM_VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Github Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          build-args: |
            BASE=${{ matrix.BASE[0] }}
            SCRYPTED_INSTALL_VERSION=latest
          context: .
          file: install/docker/Dockerfile${{ matrix.BASE[1] }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/chrisalvir1/scrypted:v${{ steps.package-version.outputs.NPM_VERSION }}-${{ matrix.BASE[2] }}
            ghcr.io/chrisalvir1/scrypted:latest
            ghcr.io/chrisalvir1/scrypted:${{ matrix.BASE[2] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
